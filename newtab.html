<!DOCTYPE html>
<html>
<head>
  <title>Shumon's Planner</title>
  <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
  <div class="a4-paper">
    <div class="header">
      <div class="date-display">
        <div id="current-date"></div>
        <div id="current-day"></div>
      </div>
    </div>
    <div class="grid-container">
      <div class="planner-section">
        <div class="section-title">Most Important Works</div>
        <textarea id="note1"></textarea>
      </div>
      <div class="planner-section">
        <div class="section-title">Meetings</div>
        <textarea id="note2"></textarea>
      </div>
      <div class="planner-section">
        <div class="section-title">Urgent Works</div>
        <textarea id="note3"></textarea>
      </div>
      <div class="planner-section">
        <div class="section-title">Personal Works</div>
        <textarea id="note4"></textarea>
      </div>
      <div class="planner-section">
        <div class="section-title">Other Works</div>
        <textarea id="note5"></textarea>
      </div>
      <div class="planner-section">
        <div class="section-title">Follow-ups & Small Stuff</div>
        <textarea id="note6"></textarea>
      </div>
    </div>
  </div>
  
  <button id="clear-all-btn">Clear All</button>

  <script src="script.js"></script>
</body>
</html>
